# Full-ADPLL closed-loop SPICE sign-off: for EACH of the 12 adpll_<filter>_<dco> configs, harden it
# (shrunk via -G so the loop is small), Magic-extract the parasitic netlist, and run a closed-loop
# ngspice transient to lock at several mul/div ratios -> time-to-lock + locked F_DCO. This is the
# analog sign-off of the whole PLL (detector + filter + lock + ring), straight from the .sv. The only
# thing verified in a logic simulator is the CSR register file (a separate, fast cocotb job).
#
# HEAVY: a transistor-level transient of a ~300 MHz ring + digital loop runs ~minutes per ratio, so
# the 12 configs fan out as a matrix (one harden each, all ratios swept in-job) and this is gated to
# on-demand + changes to the PLL RTL / flow, not every push.

name: ADPLL closed-loop SPICE

on:
  workflow_dispatch:
    inputs:
      ratios:
        description: "comma-separated mul/div ratios to lock at"
        default: "8/8,10/8,12/8,14/8"
      ref_mhz:
        description: "reference clock (MHz)"
        default: "200"
  push:
    paths:
      - 'rtl/**'
      - 'librelane/adpll.yaml'
      - 'librelane/adpll_lock.py'
      - 'Makefile'
      - 'flake.nix'
      - '.github/workflows/adpll-spice.yml'

jobs:
  adpll-spice:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        adpll:
          - adpll_bangbang_binary
          - adpll_bangbang_thermometer
          - adpll_bangbang_muxtap
          - adpll_bangbang_coarsefine
          - adpll_linear_binary
          - adpll_linear_thermometer
          - adpll_linear_muxtap
          - adpll_linear_coarsefine
          - adpll_gearshift_binary
          - adpll_gearshift_thermometer
          - adpll_gearshift_muxtap
          - adpll_gearshift_coarsefine
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            extra-substituters = https://nix-cache.fossi-foundation.org
            extra-trusted-public-keys = nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Harden ${{ matrix.adpll }} + closed-loop ngspice to lock
        env:
          ADPLL: ${{ matrix.adpll }}
          RATIOS: ${{ github.event.inputs.ratios || '8/8,10/8,12/8,14/8' }}
          REF_MHZ: ${{ github.event.inputs.ref_mhz || '200' }}
        run: |
          nix develop --accept-flake-config --command bash -ceu '
            ciel enable 019cf7a3e0de79bb0e4b6213758882d283c65816 \
              --pdk-root "$PWD/.pdk" --pdk-family gf180mcuD --include-libraries all
            make adpll-spice \
              PDK_ROOT="$PWD/.pdk" PDK=gf180mcuD SCL=gf180mcu_as_sc_mcu7t3v3 NGSPICE=ngspice \
              ADPLL="$ADPLL" RATIOS="$RATIOS" REF_MHZ="$REF_MHZ"
          '

      - name: Report time-to-lock
        if: always()
        run: |
          { echo "### ${{ matrix.adpll }} closed-loop lock (SPICE, extracted)"; echo '```'; \
            cat adpll_lock.txt 2>/dev/null; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload extracted netlist + results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adpll-spice-${{ matrix.adpll }}
          path: |
            adpll_lock.txt
            librelane/runs/*/final/spice/*.spice
          if-no-files-found: ignore
