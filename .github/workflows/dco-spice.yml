# DCO SPICE characterisation: for EACH ring_dco variant, harden it as a macro, extract the parasitic
# netlist (Magic), and sweep the tune code through ngspice -> frequency-vs-code, at ALL process
# corners (typical / ss / ff). The DCO sign-off -- the ring's frequency is physical, straight from
# the .sv via the real flow. The harden is corner-independent, so each job hardens once and sweeps
# every corner; the 4 DCO variants fan out as a matrix.
#
# Heavy (full harden + a transient per code per corner), so it runs on demand and when the DCO /
# tech cells / flow change. Toolchain comes from the Nix flake (fossi-foundation cache).

name: DCO SPICE

on:
  workflow_dispatch:
    inputs:
      dco_tune:
        description: "comma-separated DCO tune codes"
        default: "0,8,16,32,64,96,127"
  push:
    paths:
      - 'rtl/dco/**'
      - 'rtl/tech_cells/**'
      - 'librelane/**'
      - 'Makefile'
      - 'flake.nix'
      - '.github/workflows/dco-spice.yml'

jobs:
  dco-spice:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dco:
          - ring_dco_binary
          - ring_dco_thermometer
          - ring_dco_muxtap
          - ring_dco_coarsefine
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            extra-substituters = https://nix-cache.fossi-foundation.org
            extra-trusted-public-keys = nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Harden ${{ matrix.dco }} + ngspice tune sweep (all corners)
        env:
          DCO: ${{ matrix.dco }}
          DCO_TUNE: ${{ github.event.inputs.dco_tune || '0,8,16,32,64,96,127' }}
        run: |
          nix develop --accept-flake-config --command bash -ceu '
            ciel enable 019cf7a3e0de79bb0e4b6213758882d283c65816 \
              --pdk-root "$PWD/.pdk" --pdk-family gf180mcuD --include-libraries all
            make dco-spice \
              PDK_ROOT="$PWD/.pdk" PDK=gf180mcuD SCL=gf180mcu_as_sc_mcu7t3v3 NGSPICE=ngspice \
              DCO="$DCO" DCO_TUNE="$DCO_TUNE" CORNERS=typical,ss,ff
          '

      - name: Report freq-vs-code (all corners)
        if: always()
        run: |
          for c in typical ss ff; do
            f="dco_freq_${{ matrix.dco }}_$c.txt"
            { echo "### ${{ matrix.dco }} @ $c"; echo '```'; cat "$f" 2>/dev/null || echo "(missing)"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dco-spice-${{ matrix.dco }}
          path: |
            dco_freq_${{ matrix.dco }}_*.txt
            librelane/runs/*/final/spice/*.spice
          if-no-files-found: ignore
