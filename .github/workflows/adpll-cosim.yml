# Full-ADPLL closed-loop lock via gate-level mixed-signal CO-SIMULATION: the extracted ring DCO runs in
# ngspice (real transistors) and the synthesized gf180 GATE loop runs in Icarus Verilog through
# ngspice's d_cosim (ivlng shim), coupled into a true closed loop. Matrix = all 12 adpll_<filter>_<dco>
# configs x all process corners. Per cell: harden the ring (corner-independent), derive the gate loop
# from the wrapper with yosys, compile it with the PDK cell models, run ngspice at the corner.
#
# EXPERIMENTAL (hence workflow_dispatch + fail-fast:false): a cell locks only if the mul/div (12/8 ->
# 300 MHz @ 200 MHz ref) is reachable by that DCO at that corner. Coarse / multi-mode rings need
# per-config mul/div tuning for a clean lock -- red cells flag those, they are not flow bugs.
# Heavy: each cell is a transistor-level ring transient (~minutes) + an iverilog --enable-libvvp build
# (ivlng requires libvvp). See cosim/README.md.

name: ADPLL cosim (experimental)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  cosim:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        adpll:
          - adpll_bangbang_binary
          - adpll_bangbang_thermometer
          - adpll_bangbang_muxtap
          - adpll_bangbang_coarsefine
          - adpll_proportionalintegral_binary
          - adpll_proportionalintegral_thermometer
          - adpll_proportionalintegral_muxtap
          - adpll_proportionalintegral_coarsefine
          - adpll_gearshift_binary
          - adpll_gearshift_thermometer
          - adpll_gearshift_muxtap
          - adpll_gearshift_coarsefine
          - adpll_phase_proportionalintegral_binary
          - adpll_phase_proportionalintegral_thermometer
          - adpll_phase_proportionalintegral_muxtap
          - adpll_phase_proportionalintegral_coarsefine
        corner: [typical, ss, ff, sf, fs]
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            extra-substituters = https://nix-cache.fossi-foundation.org
            extra-trusted-public-keys = nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Cosim ${{ matrix.adpll }} @ ${{ matrix.corner }}
        env:
          ADPLL: ${{ matrix.adpll }}
          CORNER: ${{ matrix.corner }}
        run: |
          # The devshell toolchain is fetched from binary caches; cache.nixos.org intermittently
          # returns transient network errors (HTTP 416 / dropped connections) that fail the devshell
          # *build* -- which kills the cell in ~1-2 min, long before the ~25-min sim, and is unrelated
          # to the design. Warm the devshell first with a few retries (cheap: it only realises store
          # paths) so a cache hiccup retries instead of failing the cell; the cosim then runs once
          # against the already-built shell. A genuine NO-LOCK still fails the single make below.
          for attempt in 1 2 3 4 5; do
            nix develop --accept-flake-config --command true && break
            echo "::warning::devshell build attempt $attempt failed (likely transient cache error); retrying in 30s"
            sleep 30
          done
          nix develop --accept-flake-config --command bash -ceu '
            ciel enable 019cf7a3e0de79bb0e4b6213758882d283c65816 \
              --pdk-root "$PWD/.pdk" --pdk-family gf180mcuD --include-libraries all
            make cosim PDK_ROOT="$PWD/.pdk" PDK=gf180mcuD SCL=gf180mcu_as_sc_mcu7t3v3 \
              ADPLL="$ADPLL" CORNER="$CORNER"
            # annotate the dumped VCD with instantaneous dco/ref frequency traces (best-effort)
            out="cosim/build/$ADPLL/$CORNER"
            python3 sim/vcd_add_freq.py "$out/cosim.vcd" "$out/cosim_freq.vcd" \
              --dco dco_d --ref clk_d || echo "::warning::freq annotation skipped"
          '

      - name: Report
        if: always()
        run: |
          { echo "### ${{ matrix.adpll }} @ ${{ matrix.corner }}"; echo '```'; \
            grep -aiE "LOCKED|NO-LOCK|t_lock" cosim/build/${{ matrix.adpll }}/${{ matrix.corner }}/cosim.log 2>/dev/null || echo "(no result)"; \
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosim-${{ matrix.adpll }}-${{ matrix.corner }}
          path: |
            cosim/build/${{ matrix.adpll }}/${{ matrix.corner }}/cosim.log
            cosim/build/${{ matrix.adpll }}/${{ matrix.corner }}/cosim.vcd
            cosim/build/${{ matrix.adpll }}/${{ matrix.corner }}/cosim_freq.vcd
          if-no-files-found: ignore
